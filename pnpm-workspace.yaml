packages:
  - packages/*
  - apps/*
  - internals/*
  - play

catalogs:
  dev:
    vite: ^7.3.0
    vitest: ^4.0.16
    typescript: ~5.9.3
    eslint: ^9.37.0
    oxlint: ~1.46.0
    prettier: ~3.8.1
    npm-run-all2: ^8.0.4
  runtime:
    '@vue/shared': ^3.5.29
    '@vueuse/core': ^10.11.0
    vue: ^3.5.29
  types:
    '@types/nprogress': ^0.2.3
    '@types/node': ^24.11.0

onlyBuiltDependencies:
  - es5-ext
  - esbuild
  - fsevents
  - puppeteer
  - vue-demi

shamefullyHoist: true

shellEmulator: true

strictPeerDependencies: false
